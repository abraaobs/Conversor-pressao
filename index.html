<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manômetro — Conversor de Pressão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1b1f24;
    --panel: #23282f;
    --panel-raised: #2c323a;
    --line: rgba(255,255,255,0.07);
    --text: #e7ebef;
    --text-dim: #9aa4b0;
    --brass: #c6903a;
    --brass-bright: #e0aa52;
    --teal: #4c8c86;
    --danger: #b8563f;
    --shadow: 0 20px 50px rgba(0,0,0,0.45);
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    padding:0;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at top left, rgba(198,144,58,0.06), transparent 45%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }

  .wrap{
    max-width: 980px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap: 24px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 22px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--brass-bright);
    margin: 0 0 8px;
  }

  h1{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight: 800;
    font-size: clamp(34px, 5vw, 54px);
    letter-spacing: 0.5px;
    margin: 0;
    line-height: 0.95;
    text-transform: uppercase;
  }

  .rating-plate{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    line-height: 1.6;
    border: 1px solid var(--line);
    padding: 10px 14px;
    border-radius: 4px;
    background: var(--panel);
  }
  .rating-plate b{ color: var(--brass-bright); font-weight: 600;}

  main{
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 32px;
  }

  @media (max-width: 760px){
    main{ grid-template-columns: 1fr; }
  }

  /* --- GAUGE (signature element) --- */
  .gauge-panel{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 26px;
    box-shadow: var(--shadow);
    display:flex;
    flex-direction: column;
    align-items:center;
    gap: 18px;
  }

  .gauge-label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  svg.dial { width: 100%; max-width: 240px; overflow: visible; }
  .dial-face { fill: #191d22; stroke: var(--line); stroke-width: 2; }
  .tick { stroke: var(--text-dim); stroke-width: 2; }
  .tick.major { stroke: var(--text); stroke-width: 3; }
  .tick-label { fill: var(--text-dim); font-family:'IBM Plex Mono', monospace; font-size: 9px; }
  .needle { stroke: var(--brass-bright); stroke-width: 3; stroke-linecap: round; transition: transform 0.5s cubic-bezier(.34,1.56,.64,1); transform-origin: 120px 120px; filter: drop-shadow(0 0 4px rgba(224,170,82,0.6)); }
  .needle-hub { fill: var(--brass-bright); }
  .zone-danger { stroke: var(--danger); opacity: 0.55; }
  .zone-safe { stroke: var(--teal); opacity: 0.4; }

  .gauge-readout{
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    text-align:center;
  }
  .gauge-readout .val{
    display:block;
    font-size: 24px;
    color: var(--brass-bright);
    font-weight: 600;
    margin-top: 4px;
  }

  /* --- CONVERTER PANEL --- */
  .converter{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 30px;
    box-shadow: var(--shadow);
  }

  .field-row{
    display:grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 18px;
    align-items: end;
    margin-bottom: 26px;
  }

  @media (max-width: 560px){
    .field-row{ grid-template-columns: 1fr; }
    .swap-btn{ justify-self: center; }
  }

  .field label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .field input, .field select{
    width: 100%;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 6px;
    color: var(--text);
    padding: 12px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 17px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field select{ cursor:pointer; }
  .field input:focus, .field select:focus{
    border-color: var(--brass-bright);
  }

  .swap-btn{
    background: var(--panel-raised);
    border: 1px solid var(--line);
    color: var(--brass-bright);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: transform 0.2s, border-color 0.2s;
  }
  .swap-btn:hover{ border-color: var(--brass-bright); transform: rotate(180deg); }
  .swap-btn:focus-visible{ outline: 2px solid var(--brass-bright); outline-offset: 2px; }

  .result-line{
    display:flex;
    align-items:baseline;
    gap: 12px;
    padding-top: 20px;
    border-top: 1px dashed var(--line);
    flex-wrap: wrap;
  }
  .result-line .big{
    font-family:'Big Shoulders Display', sans-serif;
    font-size: 40px;
    font-weight: 700;
    color: var(--brass-bright);
  }
  .result-line .unit{
    font-family:'IBM Plex Mono', monospace;
    color: var(--text-dim);
    font-size: 14px;
  }

  .table-toggle{
    margin-top: 28px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--teal);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 1px;
    padding: 0;
    text-decoration: underline dotted;
  }

  table.all-units{
    width:100%;
    border-collapse: collapse;
    margin-top: 16px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
    display:none;
  }
  table.all-units.show{ display:table; }
  table.all-units td{
    padding: 8px 6px;
    border-bottom: 1px solid var(--line);
    color: var(--text-dim);
  }
  table.all-units td:last-child{
    text-align:right;
    color: var(--text);
  }

  footer{
    margin-top: 46px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align:center;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <p class="eyebrow">Instrumentação · Conversão de unidades</p>
      <h1>Conversor<br>de Pressão</h1>
    </div>
    <div class="rating-plate">
      FAIXA <b>0 — 10 bar</b><br>
      PRECISÃO <b>±0.0001</b><br>
      MODO <b>Offline / client-side</b>
    </div>
  </header>

  <main>
    <section class="gauge-panel">
      <p class="gauge-label">Leitura do manômetro</p>
      <svg class="dial" viewBox="0 0 240 240">
        <circle class="dial-face" cx="120" cy="120" r="108"></circle>
        <!-- zone arcs -->
        <path class="zone-safe" d="M 60 175 A 90 90 0 0 1 90 51" fill="none" stroke-width="8"></path>
        <path class="zone-danger" d="M 190 175 A 90 90 0 0 0 150 51" fill="none" stroke-width="8"></path>
        <g id="ticks"></g>
        <line id="needle" class="needle" x1="120" y1="120" x2="120" y2="45"></line>
        <circle class="needle-hub" cx="120" cy="120" r="9"></circle>
      </svg>
      <p class="gauge-readout">Posição do ponteiro<span class="val" id="gaugePercent">0%</span></p>
    </section>

    <section class="converter">
      <div class="field-row">
        <div class="field">
          <label for="fromValue">Valor de entrada</label>
          <input id="fromValue" type="number" inputmode="decimal" value="1" step="any">
        </div>

        <button class="swap-btn" id="swapBtn" title="Inverter unidades" aria-label="Inverter unidades">⇄</button>

        <div class="field">
          <label for="fromUnit">Unidade de origem</label>
          <select id="fromUnit"></select>
        </div>
      </div>

      <div class="field-row" style="grid-template-columns: 1fr;">
        <div class="field">
          <label for="toUnit">Converter para</label>
          <select id="toUnit"></select>
        </div>
      </div>

      <div class="result-line">
        <span class="big" id="resultValue">0</span>
        <span class="unit" id="resultUnit">bar</span>
      </div>

      <button class="table-toggle" id="toggleTable">Ver todas as unidades ▾</button>
      <table class="all-units" id="allUnitsTable"></table>
    </section>
  </main>

  <footer>
    Pa · kPa · bar · atm · psi · torr · mmHg — sem dependência de servidor
  </footer>
</div>

<script>
  // Base unit: Pascal (Pa)
  const UNITS = {
    pa:   { label: "Pascal (Pa)",        toBase: v => v,            fromBase: v => v },
    kpa:  { label: "Quilopascal (kPa)",  toBase: v => v * 1000,     fromBase: v => v / 1000 },
    bar:  { label: "Bar",                toBase: v => v * 100000,  fromBase: v => v / 100000 },
    atm:  { label: "Atmosfera (atm)",    toBase: v => v * 101325,  fromBase: v => v / 101325 },
    psi:  { label: "PSI",                toBase: v => v * 6894.757, fromBase: v => v / 6894.757 },
    torr: { label: "Torr",               toBase: v => v * 133.322, fromBase: v => v / 133.322 },
    mmhg: { label: "mmHg",               toBase: v => v * 133.322, fromBase: v => v / 133.322 },
    kgfcm2: { label: "kgf/cm²", toBase: v => v * 98066.5, fromBase: v => v / 98066.5 },
  };

  const fromValue = document.getElementById('fromValue');
  const fromUnit = document.getElementById('fromUnit');
  const toUnit = document.getElementById('toUnit');
  const resultValue = document.getElementById('resultValue');
  const resultUnit = document.getElementById('resultUnit');
  const swapBtn = document.getElementById('swapBtn');
  const toggleTable = document.getElementById('toggleTable');
  const allUnitsTable = document.getElementById('allUnitsTable');
  const needle = document.getElementById('needle');
  const gaugePercent = document.getElementById('gaugePercent');
  const ticksGroup = document.getElementById('ticks');

  function populateSelects(){
    Object.entries(UNITS).forEach(([key, unit]) => {
      const opt1 = document.createElement('option');
      opt1.value = key; opt1.textContent = unit.label;
      fromUnit.appendChild(opt1);

      const opt2 = document.createElement('option');
      opt2.value = key; opt2.textContent = unit.label;
      toUnit.appendChild(opt2);
    });
    fromUnit.value = 'bar';
    toUnit.value = 'psi';
  }

  function drawTicks(){
    for(let i = 0; i <= 10; i++){
      const angle = -120 + (i * 24); // -120deg to 120deg sweep
      const rad = angle * Math.PI / 180;
      const isMajor = i % 5 === 0;
      const outerR = 108, innerR = isMajor ? 92 : 98;
      const x1 = 120 + outerR * Math.sin(rad);
      const y1 = 120 - outerR * Math.cos(rad);
      const x2 = 120 + innerR * Math.sin(rad);
      const y2 = 120 - innerR * Math.cos(rad);
      const tick = document.createElementNS('http://www.w3.org/2000/svg','line');
      tick.setAttribute('x1', x1); tick.setAttribute('y1', y1);
      tick.setAttribute('x2', x2); tick.setAttribute('y2', y2);
      tick.setAttribute('class', 'tick' + (isMajor ? ' major' : ''));
      ticksGroup.appendChild(tick);
    }
  }

  function convert(){
    const val = parseFloat(fromValue.value);
    const fKey = fromUnit.value;
    const tKey = toUnit.value;

    if(fromValue.value.trim() === ''){
  resultValue.textContent = '—';
  resultUnit.textContent = 'digite um valor';
  fromValue.style.borderColor = '';
  return;
}

if(isNaN(val)){
  resultValue.textContent = '—';
  resultUnit.textContent = 'valor inválido';
  fromValue.style.borderColor = 'var(--danger)';
  return;
}

    if(val < 0){
  resultValue.textContent = '⚠ inválido';
  resultUnit.textContent = 'pressão absoluta não pode ser negativa';
  fromValue.style.borderColor = 'var(--danger)';
  return;
} else {
  fromValue.style.borderColor = '';
}

    const baseVal = UNITS[fKey].toBase(val);
    const converted = UNITS[tKey].fromBase(baseVal);

    resultValue.textContent = formatNumber(converted);
    resultUnit.textContent = UNITS[tKey].label;

    updateGauge(baseVal);
    if(allUnitsTable.classList.contains('show')) fillTable(baseVal, tKey);
  }

  function formatNumber(n){
  if(!isFinite(n)) return '—';
  if(Math.abs(n) >= 1000000) return n.toExponential(3);
  if(Math.abs(n) >= 1000) return n.toFixed(2);
  if(Math.abs(n) >= 0.0001 || n === 0) return parseFloat(n.toFixed(4)).toString();
  return n.toExponential(3);
}

  function updateGauge(basePaValue){
    // Scale 0 -> 10 bar (in Pa) across the dial's -120deg..120deg sweep
    const maxBar = 10;
    const barValue = basePaValue / 100000;
    const clamped = Math.max(0, Math.min(maxBar, barValue));
    const pct = clamped / maxBar;
    const angle = -120 + (pct * 240);
    needle.style.transform = `rotate(${angle}deg)`;
    gaugePercent.textContent = Math.round(pct * 100) + '%';
  }

  function fillTable(basePaValue, highlightKey){
    allUnitsTable.innerHTML = '';
    Object.entries(UNITS).forEach(([key, unit]) => {
      const row = document.createElement('tr');
      const labelCell = document.createElement('td');
      labelCell.textContent = unit.label;
      const valueCell = document.createElement('td');
      valueCell.textContent = formatNumber(unit.fromBase(basePaValue));
      if(key === highlightKey){
        row.style.color = 'var(--brass-bright)';
      }
      row.appendChild(labelCell);
      row.appendChild(valueCell);
      allUnitsTable.appendChild(row);
    });
  }

  swapBtn.addEventListener('click', () => {
    const tmp = fromUnit.value;
    fromUnit.value = toUnit.value;
    toUnit.value = tmp;
    convert();
  });

  toggleTable.addEventListener('click', () => {
    allUnitsTable.classList.toggle('show');
    toggleTable.textContent = allUnitsTable.classList.contains('show')
      ? 'Ocultar unidades ▴'
      : 'Ver todas as unidades ▾';
    if(allUnitsTable.classList.contains('show')) convert();
  });

  [fromValue, fromUnit, toUnit].forEach(el => el.addEventListener('input', convert));

  populateSelects();
  drawTicks();
  convert();
</script>
</body>
</html>
